  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; }
    .step-btn { transition: all 0.25s ease; cursor: pointer; border: none; }
    .step-btn:hover { transform: translateY(-2px); }
    .flow-card { transition: all 0.2s ease; cursor: pointer; }
    .flow-card:hover { transform: translateX(4px); }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 반응형 */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-2-reg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .main-wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
    .tab-wrap { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .card-header { background: var(--step-color); padding: 24px 32px; display: flex; align-items: center; gap: 16px; }
    .card-body { padding: 28px 32px; }
    .card-nav { border-top: 1px solid #E8E0D0; padding: 16px 32px; display: flex; justify-content: space-between; background: #FAFAF8; }

    @media (max-width: 600px) {
      .header-inner { padding: 0; }
      .main-wrap { padding: 16px 14px; }
      .tab-wrap { gap: 6px; margin-bottom: 20px; }
      .step-btn { padding: 8px 12px !important; font-size: 13px !important; }
      .card-header { padding: 18px 20px; gap: 12px; }
      .card-header h2 { font-size: 18px !important; }
      .card-header p { font-size: 12px !important; }
      .card-header span:first-child { font-size: 28px !important; }
      .card-body { padding: 18px 16px; }
      .card-nav { padding: 12px 16px; }
      .grid-3 { grid-template-columns: 1fr; gap: 10px; }
      .grid-2 { grid-template-columns: 1fr; gap: 12px; }
      .grid-2-reg { grid-template-columns: 1fr; gap: 10px; }
      .nav-btn { padding: 8px 14px !important; font-size: 13px !important; }
    }
  </style>

          register: "공급자 상품 등록 시 마지막 단계(첨부서류)에서 파일로 등록",
        },
      },
    ];

    function App() {
      const [activeStep, setActiveStep] = useState(0);
      const [expandedFlow, setExpandedFlow] = useState(null);
      const step = steps[activeStep];

      return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", fontFamily: "'Noto Sans KR', sans-serif", color: "#2C2416" }}>

          <div style={{ background: "#2C2416", color: "#F5F0E8", padding: "20px 24px", borderBottom: `4px solid ${step.color}` }}>
            <div className="header-inner">
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <img src={LOGO} alt="한국철근거래소"
                  onClick={() => { setActiveStep(0); setExpandedFlow(null); }}
                  style={{ height: 32, cursor: "pointer" }} />
                <span style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>한국철근거래소</span>
              </div>
              <h1 style={{ fontSize: 24, fontWeight: 700, letterSpacing: -0.5 }}>위탁판매 가이드</h1>
              <div style={{ fontSize: 12, color: "#9A8E7A", marginTop: 4 }}>공급자(위탁자) 기준 · 2026.02.20</div>
            </div>
          </div>

          <div className="main-wrap">
            <div className="tab-wrap">
              {steps.map((s, i) => (
                <button key={s.id} className="step-btn"
                  onClick={() => { setActiveStep(i); setExpandedFlow(null); }}
                  style={{
                    padding: "10px 16px", borderRadius: 4,
                    background: activeStep === i ? s.color : "#E8E0D0",
                    color: activeStep === i ? "#fff" : "#5A4E3A",
                    fontFamily: "inherit", fontSize: 14,
                    fontWeight: activeStep === i ? 700 : 400,
                    display: "flex", alignItems: "center", gap: 6,
                    boxShadow: activeStep === i ? `0 4px 16px ${s.color}55` : "none",
                  }}>
                  <span>{s.icon}</span><span>{s.title}</span>
                </button>
              ))}
            </div>

            <div className="fade-in" key={activeStep} style={{ background: "#fff", borderRadius: 8, overflow: "hidden", boxShadow: "0 2px 24px rgba(44,36,22,0.08)", border: "1px solid #E8E0D0" }}>

              <div className="card-header" style={{ '--step-color': step.color, background: step.color }}>
                <span style={{ fontSize: 36 }}>{step.icon}</span>
                <div>
                  <div style={{ fontSize: 11, letterSpacing: 3, color: "rgba(255,255,255,0.7)", textTransform: "uppercase", marginBottom: 4 }}>Step {step.id} / {steps.length}</div>
                  <h2 style={{ fontSize: 22, color: "#fff", fontWeight: 700 }}>{step.title}</h2>
                  <p style={{ fontSize: 14, color: "rgba(255,255,255,0.85)", marginTop: 4 }}>{step.content.summary}</p>
                </div>
              </div>

              <div className="card-body">
                {activeStep === 0 && (
                  <div>
                    <div className="grid-3" style={{ marginBottom: 24 }}>
                      {step.content.items.map((item, i) => (
                        <div key={i} style={{ background: "#F5F0E8", borderRadius: 6, padding: "16px 18px", borderLeft: `3px solid ${step.color}` }}>
                          <div style={{ fontSize: 22, marginBottom: 6 }}>{item.icon}</div>
                          <div style={{ fontSize: 11, color: "#9A8E7A", letterSpacing: 1, marginBottom: 4 }}>{item.label}</div>
                          <div style={{ fontSize: 13, fontWeight: 600 }}>{item.value}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize: 13, color: "#7A6E5A", marginBottom: 12, letterSpacing: 1 }}>운영 이유</div>
                    <div className="grid-2">
                      {step.content.reasons.map((r, i) => (
                        <div key={i} style={{ background: "#F5F0E8", borderRadius: 6, padding: "16px 18px" }}>
                          <div style={{ fontWeight: 700, marginBottom: 6, fontSize: 14 }}>{r.title}</div>
                          <div style={{ fontSize: 13, color: "#5A4E3A", lineHeight: 1.7 }}>{r.desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeStep === 1 && (
                  <div className="grid-2">
                    {step.content.safeties.map((s, i) => (
                      <div key={i} style={{ background: "#F5F0E8", borderRadius: 6, padding: "20px 18px", borderTop: `3px solid ${step.color}` }}>
                        <div style={{ fontSize: 28, marginBottom: 10 }}>{s.icon}</div>
                        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>{s.title}</div>
                        <div style={{ fontSize: 13, color: "#5A4E3A", marginBottom: 10, lineHeight: 1.6 }}>{s.desc}</div>
                        <div style={{ background: "#fff", borderRadius: 4, padding: "10px 12px", fontSize: 12, color: "#7A6E5A", lineHeight: 1.7, borderLeft: `2px solid ${step.color}` }}>{s.detail}</div>
                      </div>
                    ))}
                  </div>
                )}

                {activeStep === 2 && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {step.content.flow.map((f, i) => (
                      <div key={i} className="flow-card"
                        onClick={() => setExpandedFlow(expandedFlow === i ? null : i)}
                        style={{ background: expandedFlow === i ? "#F5F0E8" : "#FAFAF8", borderRadius: 6, padding: "14px 16px", border: `1px solid ${expandedFlow === i ? step.color : "#E8E0D0"}` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                            <span style={{ background: step.color, color: "#fff", borderRadius: 4, padding: "4px 10px", fontSize: 12, fontWeight: 700, whiteSpace: "nowrap" }}>{f.step}</span>
                            <span style={{ fontSize: 13, color: "#5A4E3A", fontWeight: 600 }}>{f.actor}</span>
                          </div>
                          <span style={{ color: step.color, fontSize: 16, flexShrink: 0, marginLeft: 8 }}>{expandedFlow === i ? "▲" : "▼"}</span>
                        </div>
                        {expandedFlow === i && (
                          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #E8E0D0", fontSize: 13, color: "#2C2416", lineHeight: 1.8 }}>{f.desc}</div>
                        )}
                      </div>
                    ))}
                    <div style={{ fontSize: 12, color: "#9A8E7A", marginTop: 4, textAlign: "center" }}>▼ 각 단계를 클릭하면 상세 내용을 확인할 수 있어요</div>
                  </div>
                )}

                {activeStep === 3 && (
                  <div className="grid-2-reg">
                    {step.content.steps.map((s, i) => (
                      <div key={i} style={{ background: "#F5F0E8", borderRadius: 6, padding: "14px 16px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                        <span style={{ background: step.color, color: "#fff", borderRadius: "50%", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 4 }}>{s.title}</div>
                          <div style={{ fontSize: 12, color: "#5A4E3A", lineHeight: 1.7 }}>{s.desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {activeStep === 4 && (
                  <div>
                    <div style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 13, color: "#7A6E5A", letterSpacing: 1, marginBottom: 10 }}>정의</div>
                      {step.content.definition.map((d, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, fontSize: 13, color: "#2C2416", lineHeight: 1.7, marginBottom: 6 }}>
                          <span style={{ color: step.color, fontWeight: 700, flexShrink: 0 }}>—</span>{d}
                        </div>
                      ))}
                    </div>
                    <div style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 13, color: "#7A6E5A", letterSpacing: 1, marginBottom: 10 }}>역할</div>
                      <div className="grid-2">
                        {step.content.roles.map((r, i) => (
                          <div key={i} style={{ background: "#F5F0E8", borderRadius: 6, padding: "16px 18px", borderLeft: `3px solid ${step.color}` }}>
                            <div style={{ fontSize: 22, marginBottom: 6 }}>{r.icon}</div>
                            <div style={{ fontWeight: 700, marginBottom: 4, fontSize: 14 }}>{r.title}</div>
                            <div style={{ fontSize: 12, color: "#5A4E3A", lineHeight: 1.7 }}>{r.desc}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div style={{ background: "#2C2416", color: "#F5F0E8", borderRadius: 6, padding: "14px 18px", display: "flex", alignItems: "flex-start", gap: 10, fontSize: 13 }}>
                      <span style={{ fontSize: 18, flexShrink: 0 }}>📎</span>
                      <div><span style={{ color: step.color, fontWeight: 700 }}>등록 방법: </span>{step.content.register}</div>
                    </div>
                  </div>
                )}
              </div>

              <div className="card-nav">
                <button className="nav-btn" onClick={() => setActiveStep(Math.max(0, activeStep - 1))} disabled={activeStep === 0}
                  style={{ padding: "10px 20px", borderRadius: 4, border: "1px solid #E8E0D0", background: activeStep === 0 ? "#F0EBE0" : "#fff", color: activeStep === 0 ? "#C0B8A8" : "#2C2416", cursor: activeStep === 0 ? "not-allowed" : "pointer", fontFamily: "inherit", fontSize: 14 }}>
                  ← 이전
                </button>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  {steps.map((s, i) => (
                    <div key={i} onClick={() => setActiveStep(i)} style={{ width: i === activeStep ? 20 : 7, height: 7, borderRadius: 4, background: i === activeStep ? step.color : "#E8E0D0", cursor: "pointer", transition: "all 0.3s ease" }} />
                  ))}
                </div>
                <button className="nav-btn" onClick={() => setActiveStep(Math.min(steps.length - 1, activeStep + 1))} disabled={activeStep === steps.length - 1}
                  style={{ padding: "10px 20px", borderRadius: 4, border: "none", background: activeStep === steps.length - 1 ? "#E8E0D0" : step.color, color: "#fff", cursor: activeStep === steps.length - 1 ? "not-allowed" : "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 600 }}>
                  다음 →
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
